<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal - Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Top header text -->
        <div class="secure-portal-tag">SECURE PORTAL</div>
        
        <!-- Lock Icon using simple HTML character -->
        <div class="lock-icon">&#128274;</div>

        <!-- Heading -->
        <h1>Authentication</h1>
        <p class="subtitle">restricted access</p>

        <!-- Badge/Counter -->
        <div class="badge">
            <span class="dot"></span> 2/3 <span class="arrow">&#9662;</span>
        </div>

        <!-- Authentication Form -->
        <form>
            <div class="input-group">
                <label for="roll-number">ROLL NUMBER</label>
                <input type="text" id="roll-number" value="767634" placeholder="Enter Roll Number">
            </div>

            <div class="input-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" value="1234" placeholder="Enter Password">
            </div>

            <!-- Error message -->
            <p class="error-text">Both fields required.</p>

            <!-- Submit Button -->
            <button type="submit" class="auth-btn">AUTHENTICATE SECURELY</button>
        </form>
    </div>

</body>
</html>
